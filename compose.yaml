services:
  coruscant:
    image: ${DOCKER_HUB_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${PORT:-1688}:3000"
    volumes:
      - ${DATA_PATH:-/volume1/docker/coruscant}:/app/data
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/coruscant.db
      - ENCRYPTION_KEY_SEED=${ENCRYPTION_KEY_SEED}
